<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- marked.js for markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- highlight.js for syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  * { -webkit-tap-highlight-color: transparent; }
  button, a, label { touch-action: manipulation; }

  :root {
    --bg: #0D0D0D;
    --surface: #141414;
    --surface-2: #1C1C1C;
    --surface-3: #222;
    --border: #2A2A2A;
    --border-light: #333;
    --text: #E0E0E0;
    --text-dim: #888;
    --text-dimmer: #555;
    --accent: #FFF;
    --code-bg: #0A0A0A;
    --user-bg: #1A1A1A;
    --radius: 6px;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ─────────────────────────────────────── */

  #app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ─────────────────────────────────────── */

  #sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width 0.2s ease;
  }

  #sidebar.collapsed {
    width: 0;
    min-width: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
    text-transform: uppercase;
  }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.15s, background 0.15s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--surface-2);
  }

  .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 16px; }
  .tab-panel.active { display: block; }

  /* ── SETTINGS ─────────────────────────────────────── */

  .setting-group {
    margin-bottom: 20px;
  }

  .setting-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .radio-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 13px;
    color: var(--text-dim);
  }

  .radio-option:hover {
    border-color: var(--border-light);
    color: var(--text);
  }

  .radio-option.selected {
    border-color: var(--text-dimmer);
    color: var(--text);
    background: var(--surface-2);
  }

  .radio-option input[type=radio] { display: none; }

  .radio-dot {
    width: 12px;
    height: 12px;
    border: 1px solid var(--border-light);
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .radio-option.selected .radio-dot {
    background: var(--text);
    border-color: var(--text);
  }

  .setting-input {
    width: 100%;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .setting-input:focus { border-color: var(--text-dimmer); }
  .setting-input::placeholder { color: var(--text-dimmer); }

  .setting-hint {
    font-size: 11px;
    color: var(--text-dimmer);
    margin-top: 5px;
    line-height: 1.4;
  }

  .api-info {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
    line-height: 1.5;
    margin-top: 6px;
  }

  .api-info a {
    color: var(--text-dim);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .api-info a:hover { color: var(--text); }

  .save-btn {
    width: 100%;
    padding: 9px;
    background: var(--surface-3);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-top: 4px;
  }

  .save-btn:hover {
    background: #2A2A2A;
    border-color: #444;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dimmer);
    margin-right: 6px;
    vertical-align: middle;
  }

  .status-dot.ok { background: #4CAF50; }
  .status-dot.err { background: #F44336; }

  /* ── MAIN CHAT ─────────────────────────────────────── */

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #topbar {
    height: 48px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    background: var(--bg);
    position: relative;
    z-index: 5;
    flex-shrink: 0;
  }

  .toggle-sidebar-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .toggle-sidebar-btn:hover {
    color: var(--text);
    background: var(--surface-2);
  }

  .topbar-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    flex: 1;
  }

  .new-chat-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    padding: 5px 12px;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .new-chat-btn:hover {
    color: var(--text);
    border-color: var(--border-light);
    background: var(--surface-2);
  }

  /* ── MESSAGES ─────────────────────────────────────── */

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 180px;
    scroll-behavior: smooth;
    position: relative;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #messages::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

  .message-row {
    display: flex;
    padding: 0 max(24px, calc(50% - 360px));
    margin-bottom: 2px;
  }

  .message-row.user { justify-content: flex-end; }
  .message-row.assistant { justify-content: flex-start; }

  .message-bubble {
    max-width: 680px;
    width: 100%;
  }

  .message-row.user .message-bubble {
    max-width: 520px;
  }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .msg-role {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dimmer);
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-dimmer);
    font-family: var(--mono);
  }

  .msg-body {
    font-size: 14px;
    line-height: 1.7;
  }

  /* User message style */
  .message-row.user .msg-body {
    background: var(--user-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* ── MARKDOWN CONTENT ─────────────────────────────── */

  .md-content p { margin-bottom: 10px; }
  .md-content p:last-child { margin-bottom: 0; }

  .md-content h1, .md-content h2, .md-content h3,
  .md-content h4, .md-content h5, .md-content h6 {
    margin: 18px 0 8px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }
  .md-content h1 { font-size: 20px; }
  .md-content h2 { font-size: 17px; }
  .md-content h3 { font-size: 15px; }

  .md-content ul, .md-content ol {
    margin: 8px 0 10px 20px;
  }

  .md-content li { margin-bottom: 4px; }

  .md-content blockquote {
    border-left: 2px solid var(--border-light);
    padding-left: 14px;
    color: var(--text-dim);
    margin: 10px 0;
    font-style: italic;
  }

  .md-content strong { color: var(--text); font-weight: 600; }
  .md-content em { font-style: italic; }

  .md-content a {
    color: var(--text-dim);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .md-content a:hover { color: var(--text); }

  .md-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  .md-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0;
    font-size: 13px;
  }

  .md-content th, .md-content td {
    border: 1px solid var(--border);
    padding: 6px 12px;
    text-align: left;
  }

  .md-content th {
    background: var(--surface-2);
    font-weight: 600;
    color: var(--text);
  }

  /* Inline code */
  .md-content code:not(pre code) {
    font-family: var(--mono);
    font-size: 12.5px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: #C9D1D9;
  }

  /* ── CODE BLOCKS ─────────────────────────────────── */

  .code-block-wrapper {
    margin: 12px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--code-bg);
  }

  .code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .code-lang {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dimmer);
    letter-spacing: 0.05em;
    text-transform: lowercase;
  }

  .code-actions {
    display: flex;
    gap: 6px;
  }

  .code-action-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    transition: all 0.15s;
  }

  .code-action-btn:hover {
    color: var(--text);
    border-color: var(--border-light);
    background: var(--surface-3);
  }

  .code-action-btn svg {
    width: 11px;
    height: 11px;
    flex-shrink: 0;
  }

  .code-block-scroll {
    max-height: 320px;
    overflow-y: auto;
    overflow-x: auto;
  }

  .code-block-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
  .code-block-scroll::-webkit-scrollbar-track { background: transparent; }
  .code-block-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

  .code-block-scroll pre {
    margin: 0 !important;
    background: transparent !important;
    border-radius: 0 !important;
    padding: 14px 16px !important;
  }

  .code-block-scroll pre code {
    font-family: var(--mono) !important;
    font-size: 13px !important;
    line-height: 1.6 !important;
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    border-radius: 0 !important;
  }

  /* ── DIVIDER ─────────────────────────────────────── */

  .turn-divider {
    margin: 16px max(24px, calc(50% - 360px));
    border: none;
    height: 1px;
    background: var(--border);
    opacity: 0.5;
  }

  /* ── THINKING ─────────────────────────────────────── */

  .thinking-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 max(24px, calc(50% - 360px));
    margin-bottom: 8px;
    color: var(--text-dimmer);
    font-size: 13px;
  }

  .thinking-dots span {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--text-dimmer);
    border-radius: 50%;
    margin: 0 1px;
    animation: blink 1.4s ease-in-out infinite;
  }

  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ── INPUT AREA ─────────────────────────────────── */

  #input-area {
    background: transparent;
    padding: 16px max(32px, calc(50% - 380px)) 24px;
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    transition: border-color 0.15s, background 0.15s;
  }

  /* ── INPUT FLOTTANT ──────────────────────────────── */

  #input-area {
    padding: 16px max(32px, calc(50% - 380px)) 28px;
    flex-shrink: 0;
    background: transparent;
  }

  .input-wrapper {
    box-shadow: none;
  }

  /* ── BOUTON FERMER SIDEBAR (mobile uniquement) ──── */

  .close-sidebar-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    margin-left: auto;
    border-radius: 4px;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .close-sidebar-btn:hover { color: var(--text); }

  /* ── OVERLAY SIDEBAR MOBILE ─────────────────────── */

  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 199;
    backdrop-filter: blur(2px);
  }
  #sidebar-overlay.visible { display: block; }

  /* ── SUPPRESSION TAP HIGHLIGHT ──────────────────── */

  * { -webkit-tap-highlight-color: transparent; }

  /* ── MOBILE ─────────────────────────────────────── */

  @media (max-width: 600px) {
    /* Sidebar plein écran */
    #sidebar {
      position: fixed;
      inset: 0;
      width: 100% !important;
      min-width: 100% !important;
      height: 100%;
      z-index: 300;
      transform: translateX(-100%);
      transition: transform 0.22s ease;
      border-right: none;
      overflow: hidden;
    }
    #sidebar.mobile-open {
      transform: translateX(0);
    }
    #sidebar.collapsed {
      transform: translateX(-100%);
      width: 100% !important;
      min-width: 100% !important;
    }

    /* Overlay */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 299;
      background: rgba(0,0,0,0.5);
    }
    #sidebar-overlay.visible { display: block; }

    /* Bouton fermer visible mobile seulement */
    .close-sidebar-btn { display: flex !important; }

    /* Input : marges latérales + arrondi haut + grand */
    #input-area {
      padding: 16px 12px max(24px, env(safe-area-inset-bottom));
    }
    .input-wrapper {
      border-radius: 12px;
      padding: 18px 14px;
      min-height: 72px;
    }
    #user-input {
      min-height: 40px;
      font-size: 16px;
    }

    /* Messages padding latéral réduit */
    .message-row {
      padding: 0 12px !important;
    }
    .turn-divider {
      margin: 12px !important;
    }
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    min-height: 22px;
    max-height: 200px;
    overflow-y: auto;
  }

  #user-input::placeholder { color: var(--text-dimmer); }

  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #send-btn {
    background: var(--surface-3);
    border: 1px solid #ffffff;
    color: #ffffff;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  #send-btn:hover:not(:disabled) {
    background: #2A2A2A;
    border-color: #ffffff;
    color: #ffffff;
  }

  #send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  #send-btn svg { 
    width: 14px; 
    height: 14px; 
    transform: rotate(-90deg);
  }

  /* ── EMPTY STATE ─────────────────────────────────── */

  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dimmer);
    gap: 8px;
    padding: 40px;
    text-align: center;
  }

  #empty-state .empty-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-dim);
  }

  #empty-state .empty-sub {
    font-size: 13px;
    max-width: 280px;
    line-height: 1.5;
  }

  .empty-icon {
    width: 32px;
    height: 32px;
    margin-bottom: 4px;
    opacity: 0.3;
  }

  /* ── TOAST ─────────────────────────────────────── */

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--surface-3);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── SCROLLBAR GLOBAL ─────────────────────────── */

  .tab-panel::-webkit-scrollbar { width: 4px; }
  .tab-panel::-webkit-scrollbar-track { background: transparent; }
  .tab-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── CLOSE SIDEBAR BTN (mobile only) ──────────── */
  .close-sidebar-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    margin-left: auto;
    border-radius: 4px;
    align-items: center;
    transition: color 0.15s;
  }
  .close-sidebar-btn:hover { color: var(--text); }

  /* ── NO CONFIG WARNING ─────────────────────────── */

  .no-config-banner {
    background: #1A1500;
    border-bottom: 1px solid #332B00;
    padding: 8px 16px;
    font-size: 12px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .no-config-banner a {
    color: #AAA;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .streaming-cursor::after {
    content: '▍';
    display: inline;
    animation: cursor-blink 0.7s step-end infinite;
    color: var(--text-dim);
    font-size: 13px;
    vertical-align: text-bottom;
  }

  @keyframes cursor-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Chat</span>
      <button class="close-sidebar-btn" onclick="toggleSidebar()" title="Fermer">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
          <line x1="4" y1="4" x2="14" y2="14"/><line x1="14" y1="4" x2="4" y2="14"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('params')">Paramètres</button>
      <button class="tab-btn" onclick="switchTab('history')">Historique</button>
    </div>

    <!-- Params panel -->
    <div class="tab-panel active" id="tab-params">

      <div class="setting-group">
        <span class="setting-label">Fournisseur API</span>
        <div class="radio-group">
          <label class="radio-option selected" id="opt-google" onclick="selectProvider('google')">
            <input type="radio" name="provider" value="google" checked>
            <span class="radio-dot"></span>
            Google Gemini API
          </label>
          <label class="radio-option" id="opt-openrouter" onclick="selectProvider('openrouter')">
            <input type="radio" name="provider" value="openrouter">
            <span class="radio-dot"></span>
            OpenRouter
          </label>
        </div>
      </div>

      <div class="setting-group" id="api-info-box">
        <!-- dynamically filled -->
      </div>

      <div class="setting-group">
        <label class="setting-label">Clé API</label>
        <input
          type="password"
          class="setting-input"
          id="api-key-input"
          placeholder="Coller la clé ici…"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <div class="setting-group">
        <label class="setting-label">Modèle</label>
        <input
          type="text"
          class="setting-input"
          id="model-input"
          placeholder="ex: gemini-2.5-flash"
          autocomplete="off"
          spellcheck="false"
        >
        <p class="setting-hint" id="model-hint"></p>
      </div>

      <div class="setting-group">
        <label class="setting-label">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Non configuré</span>
        </label>
        <button class="save-btn" onclick="saveSettings()">Enregistrer</button>
      </div>

    </div>

    <!-- History panel -->
    <div class="tab-panel" id="tab-history">
      <div style="color: var(--text-dimmer); font-size: 13px; padding: 8px 0;">
        L'historique s'efface à chaque nouvelle conversation.
      </div>
      <div id="history-list" style="margin-top: 12px; display: flex; flex-direction: column; gap: 6px;"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Afficher/masquer">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
          <rect x="2" y="3.5" width="14" height="11" rx="1.5"/>
          <line x1="6.5" y1="3.5" x2="6.5" y2="14.5"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbar-title">Nouvelle conversation</span>
      <button class="new-chat-btn" onclick="clearChat()">+ Nouveau</button>
    </div>

    <div id="no-config" class="no-config-banner" style="display:none;">
      ⚠ Aucun fournisseur configuré —
      <a onclick="switchTab('params'); document.querySelector('.tab-btn').click()">
        ouvrir les paramètres
      </a>
    </div>

    <div id="messages">
      <div id="empty-state">
        <svg class="empty-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M4 6h24v18H18l-6 5v-5H4V6z"/>
        </svg>
        <p class="empty-title">Prêt à discuter</p>
        <p class="empty-sub">Configurez votre fournisseur API dans les paramètres, puis envoyez un message.</p>
      </div>
    </div>

    <div id="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          placeholder="Écrire un message…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()" disabled title="Envoyer">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 8h10M8.5 4l4.5 4-4.5 4"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="toast"></div>

<script>
// ── STATE ─────────────────────────────────────────────

const state = {
  provider: 'google',
  apiKey: '',
  model: '',
  messages: [],       // {role, content, time}
  isLoading: false,
  configured: false,
};

const PROVIDERS = {
  google: {
    name: 'Google Gemini API',
    endpoint: (model, key) => `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?key=${key}&alt=sse`,
    defaultModel: 'gemini-2.5-flash',
    modelHint: 'ex: gemini-2.5-flash, gemini-1.5-pro, gemini-2.0-flash',
    infoHtml: `Docs: <a href="https://ai.google.dev" target="_blank">ai.google.dev</a><br>Clé: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>`,
  },
  openrouter: {
    name: 'OpenRouter',
    endpoint: () => 'https://openrouter.ai/api/v1/chat/completions',
    defaultModel: 'openai/gpt-4o-mini',
    modelHint: 'ex: openai/gpt-4o-mini, anthropic/claude-3-haiku, mistralai/mistral-7b-instruct',
    infoHtml: `Docs: <a href="https://openrouter.ai/docs" target="_blank">openrouter.ai/docs</a><br>Clé: <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a>`,
  },
};

const EXT_MAP = {
  js: 'script.js', javascript: 'script.js', ts: 'script.ts', typescript: 'script.ts',
  python: 'main.py', py: 'main.py', lua: 'main.lua', html: 'index.html',
  css: 'style.css', json: 'data.json', bash: 'script.sh', sh: 'script.sh',
  sql: 'query.sql', php: 'index.php', rust: 'main.rs', go: 'main.go',
  java: 'Main.java', cpp: 'main.cpp', c: 'main.c', rb: 'script.rb',
};

marked.setOptions({ breaks: true, gfm: true });

// ── VIRTUALISATION ────────────────────────────────────
// Les messages hors-écran sont "endormis" : remplacés par un div vide
// de la même hauteur. Ils se réveillent quand on scroll dessus.

const msgObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const el = entry.target;
    if (entry.isIntersecting) {
      wakeMessage(el);
    } else {
      sleepMessage(el);
    }
  });
}, {
  root: document.getElementById('messages'),
  rootMargin: '300px 0px 300px 0px', // marge de préchargement
  threshold: 0,
});

function sleepMessage(el) {
  // Ne pas endormir un message déjà endormi, le dernier message, ou un message en cours
  if (el.dataset.sleeping === '1') return;
  if (el.dataset.last === '1') return;
  if (el.classList.contains('streaming')) return;
  const h = el.offsetHeight;
  if (h === 0) return;
  el.dataset.sleeping = '1';
  el.dataset.cachedHeight = h;
  el.dataset.cachedHtml = el.innerHTML;
  el.innerHTML = '';
  el.style.height = h + 'px';
  el.style.minHeight = '';
}

function wakeMessage(el) {
  if (el.dataset.sleeping !== '1') return;
  el.dataset.sleeping = '0';
  el.style.height = '';
  el.innerHTML = el.dataset.cachedHtml || '';
  delete el.dataset.cachedHtml;
}

// ── INIT ─────────────────────────────────────────────

function init() {
  const saved = JSON.parse(localStorage.getItem('chat-config') || '{}');
  if (saved.provider) state.provider = saved.provider;
  if (saved.apiKey) state.apiKey = saved.apiKey;
  if (saved.model) state.model = saved.model;

  document.getElementById('api-key-input').value = state.apiKey;
  document.getElementById('model-input').value = state.model || '';
  selectProvider(state.provider, false);

  checkConfigured();
  renderProviderInfo();
  updateSendBtn();
}

function checkConfigured() {
  state.configured = !!(state.apiKey && state.model);
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const banner = document.getElementById('no-config');

  if (state.configured) {
    dot.className = 'status-dot ok';
    text.textContent = 'Configuré';
    banner.style.display = 'none';
  } else {
    dot.className = 'status-dot';
    text.textContent = 'Non configuré';
    banner.style.display = state.messages.length > 0 ? 'flex' : 'none';
  }
}

// ── TABS ─────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'params') || (i === 1 && tab === 'history'));
  });
  document.getElementById('tab-params').classList.toggle('active', tab === 'params');
  document.getElementById('tab-history').classList.toggle('active', tab === 'history');
}

// ── PROVIDER ─────────────────────────────────────────

function selectProvider(id, updateInput = true) {
  state.provider = id;
  document.getElementById('opt-google').classList.toggle('selected', id === 'google');
  document.getElementById('opt-openrouter').classList.toggle('selected', id === 'openrouter');
  renderProviderInfo();

  document.getElementById('model-hint').textContent = PROVIDERS[id].modelHint;
}

function renderProviderInfo() {
  const p = PROVIDERS[state.provider];
  document.getElementById('api-info-box').innerHTML = `
    <div class="api-info">${p.infoHtml}</div>
  `;
}

// ── SETTINGS ─────────────────────────────────────────

function saveSettings() {
  state.apiKey = document.getElementById('api-key-input').value.trim();
  state.model = document.getElementById('model-input').value.trim();
  document.getElementById('model-input').value = state.model;

  localStorage.setItem('chat-config', JSON.stringify({
    provider: state.provider,
    apiKey: state.apiKey,
    model: state.model,
  }));

  checkConfigured();
  updateSendBtn();
  showToast('Paramètres enregistrés');
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  if (window.innerWidth <= 600) {
    const opening = !sidebar.classList.contains('mobile-open');
    sidebar.classList.toggle('mobile-open', opening);
    overlay.classList.toggle('visible', opening);
  } else {
    sidebar.classList.toggle('collapsed');
  }
}

// ── CHAT ─────────────────────────────────────────────

function clearChat() {
  // Désinscrire tous les messages de l'observer
  document.querySelectorAll('.message-row').forEach(el => msgObserver.unobserve(el));

  state.messages = [];
  const container = document.getElementById('messages');
  container.innerHTML = `
    <div id="empty-state">
      <svg class="empty-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M4 6h24v18H18l-6 5v-5H4V6z"/>
      </svg>
      <p class="empty-title">Prêt à discuter</p>
      <p class="empty-sub">Configurez votre fournisseur API dans les paramètres, puis envoyez un message.</p>
    </div>
  `;
  document.getElementById('topbar-title').textContent = 'Nouvelle conversation';
  document.getElementById('history-list').innerHTML = '';
  updateSendBtn();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  updateSendBtn();
}

function updateSendBtn() {
  const val = document.getElementById('user-input').value.trim();
  document.getElementById('send-btn').disabled = !val || state.isLoading;
}

function nowStr() {
  return new Date().toLocaleTimeString('fr', { hour: '2-digit', minute: '2-digit' });
}

function removeEmptyState() {
  const es = document.getElementById('empty-state');
  if (es) es.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || state.isLoading) return;

  if (!state.configured) {
    showToast('Configurez votre API dans les paramètres');
    return;
  }

  removeEmptyState();
  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();

  // Marquer l'ancien "dernier message" pour qu'il puisse être endormi
  const prevLast = document.querySelector('.message-row[data-last="1"]');
  if (prevLast) delete prevLast.dataset.last;

  const userMsg = { role: 'user', content: text, time: nowStr() };
  state.messages.push(userMsg);
  appendMessage(userMsg, false);

  const divider = document.createElement('hr');
  divider.className = 'turn-divider';
  document.getElementById('messages').appendChild(divider);

  if (state.messages.length === 1) {
    document.getElementById('topbar-title').textContent =
      text.length > 40 ? text.slice(0, 40) + '…' : text;
  }

  state.isLoading = true;
  updateSendBtn();

  const thinking = document.createElement('div');
  thinking.className = 'thinking-indicator';
  thinking.id = 'thinking';
  thinking.innerHTML = `<span class="thinking-dots"><span></span><span></span><span></span></span> <span style="font-size:12px">Génération en cours…</span>`;
  document.getElementById('messages').appendChild(thinking);
  scrollToBottom();

  try {
    let assistantContent = '';
    if (state.provider === 'google') {
      assistantContent = await streamGoogle();
    } else {
      assistantContent = await streamOpenRouter();
    }

    document.getElementById('thinking')?.remove();

    const assistantMsg = { role: 'assistant', content: assistantContent, time: nowStr() };
    state.messages.push(assistantMsg);
    appendMessage(assistantMsg, true); // dernier = true
    updateHistory();

  } catch (err) {
    document.getElementById('thinking')?.remove();
    const errMsg = { role: 'assistant', content: `**Erreur** : ${err.message}`, time: nowStr() };
    state.messages.push(errMsg);
    appendMessage(errMsg, true);
  }

  state.isLoading = false;
  updateSendBtn();
  scrollToBottom();
}

// ── GOOGLE GEMINI STREAM ──────────────────────────────

async function streamGoogle() {
  const p = PROVIDERS.google;
  const url = p.endpoint(state.model, state.apiKey);

  const geminiMessages = state.messages.slice(0, -1).map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }],
  }));

  const lastUser = state.messages[state.messages.length - 1];
  geminiMessages.push({ role: 'user', parts: [{ text: lastUser.content }] });

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: geminiMessages }),
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${resp.status}`);
  }

  return await readSSEStream(resp, (chunk) => {
    try {
      const j = JSON.parse(chunk);
      return j?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    } catch { return ''; }
  });
}

// ── OPENROUTER STREAM ────────────────────────────────

async function streamOpenRouter() {
  const url = PROVIDERS.openrouter.endpoint();

  const oaMessages = state.messages.map(m => ({
    role: m.role,
    content: m.content,
  }));

  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${state.apiKey}`,
      'HTTP-Referer': window.location.href,
      'X-Title': 'Chat Interface',
    },
    body: JSON.stringify({
      model: state.model,
      messages: oaMessages,
      stream: true,
    }),
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${resp.status}`);
  }

  return await readSSEStream(resp, (chunk) => {
    if (chunk === '[DONE]') return '';
    try {
      const j = JSON.parse(chunk);
      return j?.choices?.[0]?.delta?.content || '';
    } catch { return ''; }
  });
}

// ── SSE READER ───────────────────────────────────────

async function readSSEStream(resp, extractText) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let full = '';

  // Bulle de streaming temporaire (texte brut, pas de markdown)
  const streamId = 'stream-' + Date.now();
  const row = document.createElement('div');
  row.className = 'message-row assistant streaming';
  row.id = streamId;
  row.innerHTML = `
    <div class="message-bubble">
      <div class="msg-header">
        <span class="msg-role">Assistant</span>
        <span class="msg-time">${nowStr()}</span>
      </div>
      <div class="md-content streaming-cursor" id="${streamId}-content" style="white-space:pre-wrap;font-family:var(--mono);font-size:13px;"></div>
    </div>
  `;
  document.getElementById('thinking')?.before(row);
  const contentEl = document.getElementById(`${streamId}-content`);

  let lastScroll = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      const text = extractText(data);
      if (text) {
        full += text;
        // textContent = zéro parsing, zéro DOM mutation complexe
        contentEl.textContent = full;
        const t = Date.now();
        if (t - lastScroll > 100) { scrollToBottom(); lastScroll = t; }
      }
    }
  }

  contentEl.classList.remove('streaming-cursor');
  row.remove();
  return full;
}

// ── RENDER ───────────────────────────────────────────

function buildMessageDOM(msg) {
  const row = document.createElement('div');
  row.className = `message-row ${msg.role}`;

  if (msg.role === 'user') {
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.innerHTML = `
      <div class="msg-header" style="justify-content: flex-end;">
        <span class="msg-time">${msg.time}</span>
        <span class="msg-role">Vous</span>
      </div>
      <div class="msg-body">${escapeHtml(msg.content)}</div>
    `;
    row.appendChild(bubble);
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';

    const header = document.createElement('div');
    header.className = 'msg-header';
    header.innerHTML = `<span class="msg-role">Assistant</span><span class="msg-time">${msg.time}</span>`;

    const mdDiv = document.createElement('div');
    mdDiv.className = 'md-content';
    mdDiv.innerHTML = marked.parse(msg.content);

    // Highlight + wrap uniquement sur ce message
    mdDiv.querySelectorAll('pre code').forEach(codeEl => {
      let lang = '';
      codeEl.classList.forEach(c => {
        if (c.startsWith('language-')) lang = c.replace('language-', '');
      });
      if (lang && hljs.getLanguage(lang)) {
        codeEl.innerHTML = hljs.highlight(codeEl.textContent, { language: lang }).value;
        codeEl.classList.add('hljs');
      }
      wrapPre(codeEl.closest('pre'), lang);
    });

    bubble.appendChild(header);
    bubble.appendChild(mdDiv);
    row.appendChild(bubble);
  }

  return row;
}

function appendMessage(msg, isLast = false) {
  const container = document.getElementById('messages');
  const row = buildMessageDOM(msg);
  if (isLast) row.dataset.last = '1';
  container.appendChild(row);
  // Observer pour virtualisation (seulement les messages non-derniers)
  if (!isLast) msgObserver.observe(row);
  scrollToBottom();
}

// ── CODE BLOCK WRAPPING ───────────────────────────────

function wrapPre(pre, lang) {
  if (!pre || pre.classList.contains('wrapped')) return;
  pre.classList.add('wrapped');

  const parent = pre.parentNode;
  if (!parent) return;

  const code = pre.querySelector('code');
  const codeText = code ? (code.innerText || code.textContent) : '';
  const filename = EXT_MAP[lang] || '';

  const wrapper = document.createElement('div');
  wrapper.className = 'code-block-wrapper';

  const header = document.createElement('div');
  header.className = 'code-block-header';

  const langSpan = document.createElement('span');
  langSpan.className = 'code-lang';
  langSpan.textContent = lang || 'code';

  const actions = document.createElement('div');
  actions.className = 'code-actions';

  const dlBtn = document.createElement('button');
  dlBtn.className = 'code-action-btn';
  dlBtn.innerHTML = `<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 2v7M4 7l3 3 3-3"/><path d="M2 11h10"/></svg>${filename || 'download'}`;
  dlBtn.addEventListener('click', () => downloadCode(dlBtn, codeText, filename));

  const cpBtn = document.createElement('button');
  cpBtn.className = 'code-action-btn';
  cpBtn.innerHTML = `<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="8" height="9" rx="1"/><path d="M4 3V2a1 1 0 011-1h7a1 1 0 011 1v9a1 1 0 01-1 1H10"/></svg>copier`;
  cpBtn.addEventListener('click', () => copyCode(cpBtn, codeText));

  actions.appendChild(dlBtn);
  actions.appendChild(cpBtn);
  header.appendChild(langSpan);
  header.appendChild(actions);

  const scroll = document.createElement('div');
  scroll.className = 'code-block-scroll';

  wrapper.appendChild(header);
  wrapper.appendChild(scroll);

  parent.insertBefore(wrapper, pre);
  scroll.appendChild(pre);
}

// ── CODE ACTIONS ─────────────────────────────────────

function copyCode(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 7l3.5 3.5L12 3"/></svg>copié`;
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}

function downloadCode(btn, text, name) {
  const fname = name || 'download';
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fname;
  a.click();
  URL.revokeObjectURL(url);

  const orig = btn.innerHTML;
  btn.innerHTML = `<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 7l3.5 3.5L12 3"/></svg>téléchargé`;
  setTimeout(() => { btn.innerHTML = orig; }, 1800);
}

// ── HISTORY ─────────────────────────────────────────

function updateHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  state.messages.filter(m => m.role === 'user').forEach((m, i) => {
    const el = document.createElement('div');
    el.style.cssText = 'padding: 8px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; color: var(--text-dim); cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;';
    el.title = m.content;
    el.textContent = `${i + 1}. ${m.content.slice(0, 60)}${m.content.length > 60 ? '…' : ''}`;
    list.appendChild(el);
  });
}

// ── UTILS ────────────────────────────────────────────

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function scrollToBottom() {
  const messages = document.getElementById('messages');
  messages.scrollTop = messages.scrollHeight;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INPUT LISTENER ───────────────────────────────────

document.getElementById('user-input').addEventListener('input', updateSendBtn);

// ── START ────────────────────────────────────────────

init();
</script>
